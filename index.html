  <style>
    /* ── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0a;
      --bg2:       #111111;
      --surface:   #161616;
      --surface2:  #1e1e1e;
      --border:    #252525;
      --border2:   #333333;
      --accent:    #00e5ff;
      --accent2:   #7c3aed;
      --accent3:   #f59e0b;
      --text:      #ececec;
      --muted:     #888888;
      --muted2:    #666666;
      --font:      'Inter', system-ui, -apple-system, sans-serif;
      --mono:      'JetBrains Mono', 'Fira Code', monospace;
      --radius:    14px;
      --radius-sm: 8px;
      --max:       1120px;
      --trans:     0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    ::selection { background: var(--accent); color: #000; }
    a { color: inherit; text-decoration: none; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 3px; }

    /* ── Background effects ───────────────────────────────── */
    .bg-grid {
      position: fixed; inset: 0; z-index: -3;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 64px 64px;
      opacity: 0.25;
    }

    .bg-noise {
      position: fixed; inset: 0; z-index: -2;
      pointer-events: none; opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    .glow { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: -1; }
    .glow-1 { width: 600px; height: 600px; background: rgba(0,229,255,0.05); top: -150px; right: -100px; }
    .glow-2 { width: 500px; height: 500px; background: rgba(124,58,237,0.07); bottom: 5%; left: -120px; }
    .glow-3 { width: 300px; height: 300px; background: rgba(245,158,11,0.04); top: 40%; right: 10%; }

    .cursor-glow {
      position: fixed; width: 350px; height: 350px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.04), transparent 70%);
      pointer-events: none; z-index: 0;
      transform: translate(-50%, -50%);
      transition: left 0.08s, top 0.08s;
    }

    /* ── Nav ──────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 1.1rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,10,10,0.8);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid transparent;
      transition: border-color var(--trans);
    }
    nav.scrolled { border-bottom-color: var(--border); }

    .nav-logo {
      font-family: var(--mono); font-size: 1rem;
      color: var(--accent); font-weight: 600; letter-spacing: -0.02em;
    }
    .nav-logo span { color: var(--muted); }

    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: 0.8rem; color: var(--muted);
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: color var(--trans); position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -3px; left: 0; right: 0;
      height: 1px; background: var(--accent);
      transform: scaleX(0); transition: transform var(--trans);
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after { transform: scaleX(1); }

    .nav-menu-btn {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 4px;
    }
    .nav-menu-btn span {
      display: block; width: 22px; height: 2px;
      background: var(--text); transition: var(--trans); border-radius: 2px;
    }

    @media (max-width: 680px) {
      nav { padding: 0.9rem 1.25rem; }
      .nav-links {
        position: fixed; top: 0; right: -100%;
        width: 240px; height: 100vh;
        background: var(--surface);
        flex-direction: column; justify-content: center; align-items: center;
        gap: 2rem; transition: right var(--trans);
        border-left: 1px solid var(--border);
        z-index: 101;
      }
      .nav-links.open { right: 0; }
      .nav-links a { font-size: 0.95rem; }
      .nav-menu-btn { display: flex; }
      .nav-cmd-label { display: none; }

      .hero-stats { gap: 1.5rem; }
      .stat-num { font-size: 1.4rem; }

      .section-wrap { padding: 4rem 1.25rem; }

      .profile-col { order: -1; }
      .profile-img-wrap { max-width: 180px; margin: 0 auto; }

      .hero-cta { flex-direction: column; }
      .hero-cta .btn { width: 100%; justify-content: center; }

      .contact-cta { flex-direction: column; align-items: center; }
      .contact-cta .btn { width: 100%; max-width: 320px; justify-content: center; }

      .edu-card { flex-direction: column; gap: 1rem; padding: 1.25rem; }

      .timeline { padding-left: 1.75rem; }
      .timeline-dot { left: -2.125rem; }

      .timeline-header { flex-direction: column; gap: 0.4rem; }
      .timeline-date { align-self: flex-start; }

      .cmd-box { margin: 0 0.75rem; }
    }

    @media (max-width: 400px) {
      .hero-title { font-size: 2.6rem; }
      .hero-stats { flex-direction: column; gap: 1rem; padding-top: 1.5rem; }
    }

    /* ── Shared section styles ────────────────────────────── */
    .section-wrap {
      padding: 6rem 2rem;
      max-width: var(--max);
      margin: 0 auto;
    }

    .section-label {
      font-family: var(--mono); font-size: 0.72rem;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 0.6rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .section-label::after {
      content: ''; flex: 1; max-width: 60px; height: 1px; background: var(--accent); opacity: 0.4;
    }

    .section-title {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 800; letter-spacing: -0.035em;
      line-height: 1.1; margin-bottom: 1rem;
    }

    hr.divider {
      border: none; border-top: 1px solid var(--border);
      max-width: var(--max); margin: 0 auto;
    }

    /* ── Fade-up (only when JS is active) ────────────────── */
    .js .fade-up {
      opacity: 0; transform: translateY(28px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .js .fade-up.visible { opacity: 1; transform: translateY(0); }
    .js .fade-up.d1 { transition-delay: 0.08s; }
    .js .fade-up.d2 { transition-delay: 0.16s; }
    .js .fade-up.d3 { transition-delay: 0.24s; }
    .js .fade-up.d4 { transition-delay: 0.32s; }

    /* ── Buttons ──────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.8rem 1.6rem; border-radius: var(--radius-sm);
      font-size: 0.875rem; font-weight: 600;
      cursor: pointer; transition: all var(--trans); border: none;
      font-family: var(--font);
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover {
      background: #fff; transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,229,255,0.25);
    }
    .btn-ghost {
      background: transparent; color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover {
      border-color: var(--accent); color: var(--accent);
      transform: translateY(-2px);
    }

    /* ── Hero ─────────────────────────────────────────────── */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center;
      max-width: var(--max); margin: 0 auto;
      padding: 6rem 2rem 4rem;
    }

    .hero-eyebrow {
      font-family: var(--mono); font-size: 0.85rem;
      color: var(--muted); letter-spacing: 0.06em;
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .hero-eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,255,0.4); }
      50% { box-shadow: 0 0 0 6px rgba(0,229,255,0); }
    }

    .hero-title {
      font-size: clamp(3.2rem, 8.5vw, 6.5rem);
      font-weight: 800; letter-spacing: -0.04em;
      line-height: 0.95; margin-bottom: 1.5rem;
    }
    .hero-title .grad {
      background: linear-gradient(135deg, var(--accent) 0%, #00b4d8 40%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--muted); max-width: 520px;
      margin-bottom: 0.75rem; line-height: 1.65;
    }

    .hero-role-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.4rem 0.9rem;
      background: rgba(0,229,255,0.06);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 100px;
      font-family: var(--mono); font-size: 0.75rem;
      color: var(--accent); margin-bottom: 2rem;
      width: fit-content;
    }
    .hero-role-badge .lock { font-size: 0.7rem; opacity: 0.7; }

    .hero-cta { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    /* Stats strip */
    .hero-stats {
      display: flex; gap: 3rem; margin-top: 4rem;
      padding-top: 2.5rem; border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat-item {}
    .stat-num {
      font-size: 1.8rem; font-weight: 800;
      letter-spacing: -0.04em; color: var(--text);
      font-family: var(--mono);
    }
    .stat-num span { color: var(--accent); }
    .stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }

    /* ── About ────────────────────────────────────────────── */
    .about-grid {
      display: grid; grid-template-columns: 1fr 1.2fr 1fr;
      gap: 4rem; align-items: start; margin-top: 3rem;
    }
    @media (max-width: 900px) { .about-grid { grid-template-columns: 1fr 1fr; gap: 2.5rem; } }
    @media (max-width: 600px) { .about-grid { grid-template-columns: 1fr; gap: 2.5rem; } }

    .profile-col {
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }

    .profile-img-wrap {
      position: relative; width: 100%; max-width: 240px;
    }

    .profile-img-wrap::before {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      z-index: 0;
    }

    .profile-img {
      position: relative; z-index: 1;
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover; object-position: top;
      border-radius: 16px;
      display: block;
      border: 3px solid var(--bg);
    }

    .profile-placeholder {
      position: relative; z-index: 1;
      width: 100%; aspect-ratio: 3/4;
      border-radius: 16px;
      background: var(--surface2);
      border: 3px solid var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.5rem; color: var(--muted2);
      font-size: 0.75rem; font-family: var(--mono);
    }

    .profile-placeholder svg { opacity: 0.3; }

    .about-text p { color: var(--muted); margin-bottom: 1.1rem; font-size: 1rem; }
    .about-text p strong { color: var(--text); font-weight: 600; }

    .awards-list {
      display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1.5rem;
    }
    .award-item {
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.875rem; color: var(--muted);
    }
    .award-item::before { content: '◆'; color: var(--accent3); font-size: 0.5rem; flex-shrink: 0; }

    .skills-section-label {
      font-family: var(--mono); font-size: 0.7rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted2); margin-bottom: 1rem; margin-top: 0.25rem;
    }

    .skills-group { margin-bottom: 1.75rem; }

    .skills-grid {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
    }

    .skill-tag {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.35rem 0.85rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px;
      font-family: var(--mono); font-size: 0.75rem; color: var(--muted);
      transition: all var(--trans);
    }
    .skill-tag:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,255,0.04); }
    .skill-tag .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .skill-tag .dot.purple { background: var(--accent2); }
    .skill-tag .dot.amber { background: var(--accent3); }

    /* ── Projects ─────────────────────────────────────────── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem; margin-top: 3rem;
    }
    @media (max-width: 480px) { .projects-grid { grid-template-columns: 1fr; } }

    .project-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.75rem;
      transition: all var(--trans); position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .project-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,229,255,0.03), rgba(124,58,237,0.03));
      opacity: 0; transition: opacity var(--trans);
    }
    .project-card:hover {
      border-color: rgba(0,229,255,0.35);
      transform: translateY(-4px);
      box-shadow: 0 16px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,229,255,0.08);
    }
    .project-card:hover::before { opacity: 1; }

    .project-card.featured {
      border-color: rgba(0,229,255,0.2);
      background: linear-gradient(135deg, var(--surface) 0%, rgba(0,229,255,0.02) 100%);
    }

    .featured-badge {
      position: absolute; top: 1rem; right: 1rem;
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent3); background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.2);
      padding: 0.2rem 0.5rem; border-radius: 4px;
    }

    .project-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
    .project-icon { font-size: 1.6rem; }

    .project-links { display: flex; gap: 0.6rem; }
    .project-link {
      font-family: var(--mono); font-size: 0.72rem;
      color: var(--muted2); border: 1px solid var(--border);
      padding: 0.2rem 0.55rem; border-radius: 4px;
      transition: all var(--trans);
    }
    .project-link:hover { color: var(--accent); border-color: var(--accent); }

    .project-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.4rem; letter-spacing: -0.02em; }
    .project-desc { font-size: 0.875rem; color: var(--muted); line-height: 1.7; margin-bottom: 1.25rem; flex: 1; }

    .project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag {
      font-family: var(--mono); font-size: 0.7rem;
      padding: 0.2rem 0.55rem; border-radius: 4px;
      background: rgba(0,229,255,0.06); color: var(--accent);
      border: 1px solid rgba(0,229,255,0.12);
    }

    /* ── Experience ───────────────────────────────────────── */
    .timeline { margin-top: 3rem; position: relative; padding-left: 2.5rem; }
    .timeline::before {
      content: ''; position: absolute; left: 0; top: 10px; bottom: 10px;
      width: 1px;
      background: linear-gradient(to bottom, var(--accent), var(--accent2) 60%, transparent);
    }

    .timeline-item { position: relative; padding-bottom: 3.5rem; }
    .timeline-item:last-child { padding-bottom: 0; }

    .timeline-dot {
      position: absolute; left: -2.875rem; top: 5px;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.15), 0 0 12px rgba(0,229,255,0.3);
    }
    .timeline-item:nth-child(2) .timeline-dot { background: var(--accent2); box-shadow: 0 0 0 3px rgba(124,58,237,0.15), 0 0 12px rgba(124,58,237,0.3); }

    .timeline-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 1rem; flex-wrap: wrap;
      margin-bottom: 0.3rem;
    }

    .timeline-role { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; }
    .timeline-date {
      font-family: var(--mono); font-size: 0.72rem;
      color: var(--accent); letter-spacing: 0.05em;
      background: rgba(0,229,255,0.06); border: 1px solid rgba(0,229,255,0.15);
      padding: 0.2rem 0.6rem; border-radius: 4px; white-space: nowrap;
      flex-shrink: 0;
    }
    .timeline-item:nth-child(2) .timeline-date {
      color: var(--accent2);
      background: rgba(124,58,237,0.06); border-color: rgba(124,58,237,0.15);
    }

    .timeline-company {
      font-size: 0.9rem; color: var(--muted); margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .timeline-company strong { color: var(--text); font-weight: 600; }

    .timeline-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .timeline-bullets li {
      font-size: 0.875rem; color: var(--muted); line-height: 1.65;
      padding-left: 1.25rem; position: relative;
    }
    .timeline-bullets li::before {
      content: '→'; position: absolute; left: 0;
      color: var(--accent); font-size: 0.75rem; top: 0.1rem;
    }
    .timeline-item:nth-child(2) .timeline-bullets li::before { color: var(--accent2); }

    .clearance-badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      font-family: var(--mono); font-size: 0.68rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent3); background: rgba(245,158,11,0.07);
      border: 1px solid rgba(245,158,11,0.2);
      padding: 0.2rem 0.55rem; border-radius: 4px;
      margin-left: 0.5rem;
    }

    /* ── Education ────────────────────────────────────────── */
    .edu-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 2rem;
      display: flex; gap: 2rem; align-items: flex-start;
      margin-top: 3rem; transition: all var(--trans);
    }
    .edu-card:hover { border-color: rgba(124,58,237,0.35); transform: translateY(-2px); }

    .edu-icon {
      font-size: 2.5rem; flex-shrink: 0;
      width: 64px; height: 64px;
      background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
    }

    .edu-degree { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
    .edu-school { font-size: 0.95rem; color: var(--accent2); font-weight: 600; margin-bottom: 0.25rem; }
    .edu-year { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); margin-bottom: 1rem; }

    .edu-awards { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .edu-award {
      font-size: 0.75rem; padding: 0.2rem 0.65rem;
      background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.18);
      border-radius: 4px; color: var(--accent3);
    }

    @media (max-width: 600px) {
      .edu-card { flex-direction: column; gap: 1.25rem; }
    }

    /* ── Contact ──────────────────────────────────────────── */
    #contact-section { text-align: center; }

    .contact-title {
      font-size: clamp(2.5rem, 5vw, 3.5rem);
      font-weight: 800; letter-spacing: -0.04em; line-height: 1.05;
      margin-bottom: 1rem;
    }
    .contact-title .grad {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .contact-sub { color: var(--muted); font-size: 1rem; max-width: 420px; margin: 0 auto 2.5rem; }

    .contact-cta { display: flex; justify-content: center; gap: 0.75rem; flex-wrap: wrap; }

    .contact-links {
      display: flex; justify-content: center; gap: 0.75rem;
      flex-wrap: wrap; margin-top: 2.5rem;
    }
    .contact-link {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1.1rem; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 0.83rem; color: var(--muted);
      transition: all var(--trans);
    }
    .contact-link:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .contact-link svg { flex-shrink: 0; }

    /* ── Currently building ──────────────────────────────── */
    .currently-building {
      display: inline-flex; align-items: center; gap: 0.6rem;
      margin-top: 0.5rem; margin-bottom: 0.25rem;
      padding: 0.45rem 0.9rem;
      background: rgba(0,229,255,0.05);
      border: 1px solid rgba(0,229,255,0.15);
      border-radius: 100px; width: fit-content;
    }
    .cb-label {
      font-family: var(--mono); font-size: 0.7rem;
      color: var(--muted2); letter-spacing: 0.05em;
    }
    .cb-label::before { content: '▶ '; color: var(--accent); font-size: 0.55rem; }
    .cb-link {
      font-family: var(--mono); font-size: 0.7rem;
      color: var(--accent); transition: opacity var(--trans);
    }
    .cb-link:hover { opacity: 0.7; }

    /* ── Skip to content (a11y) ───────────────────────────── */
    .skip-link {
      position: absolute; top: -40px; left: 1rem;
      background: var(--accent); color: #000;
      padding: 0.5rem 1rem; border-radius: 0 0 6px 6px;
      font-size: 0.85rem; font-weight: 600;
      transition: top 0.2s; z-index: 500;
    }
    .skip-link:focus { top: 0; }

    /* ── Scroll progress ──────────────────────────────────── */
    #scroll-progress {
      position: fixed; top: 0; left: 0; z-index: 200;
      height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.1s linear;
    }

    /* ── Toast ────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); padding: 0.65rem 1.25rem;
      border-radius: var(--radius-sm); font-size: 0.83rem;
      display: flex; align-items: center; gap: 0.5rem;
      opacity: 0; pointer-events: none; z-index: 300;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast-icon { color: var(--accent); font-size: 0.9rem; }

    /* ── Command palette ──────────────────────────────────── */
    .cmd-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 15vh;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;

      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--radius); overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6);
      transform: scale(0.96) translateY(-8px);
      transition: transform 0.2s;
      margin: 0 1rem;
    }
    .cmd-overlay.open .cmd-box { transform: scale(1) translateY(0); }

    .cmd-input-wrap {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .cmd-icon { color: var(--muted2); flex-shrink: 0; }
    .cmd-input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--text); font-family: var(--font); font-size: 1rem;
    }
    .cmd-input::placeholder { color: var(--muted2); }
    .cmd-hint { font-family: var(--mono); font-size: 0.68rem; color: var(--muted2); flex-shrink: 0; }

    .cmd-results { max-height: 360px; overflow-y: auto; padding: 0.5rem; }

    .cmd-group-label {
      font-family: var(--mono); font-size: 0.65rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted2); padding: 0.5rem 0.75rem 0.25rem;
    }

    .cmd-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.65rem 0.75rem; border-radius: var(--radius-sm);
      cursor: pointer; transition: background var(--trans);
