<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Zohn Wheeler</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0a0a0a; --border: #252525; --accent: #00e5ff; --accent2: #7c3aed; --text: #ececec; --muted: #888; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .bg-grid { position: fixed; inset: 0; z-index: -1; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 64px 64px; opacity: 0.18; }
    .code { font-family: 'JetBrains Mono', monospace; font-size: clamp(5rem, 18vw, 9rem); font-weight: 800; line-height: 1; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    h1 { font-size: 1.3rem; font-weight: 600; margin: 1rem 0 0.5rem; }
    p { color: var(--muted); font-size: 0.95rem; max-width: 420px; margin-bottom: 2rem; }
    a.btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; background: var(--accent); color: #000; text-decoration: none; transition: all 0.25s; }
    a.btn:hover { background: #fff; transform: translateY(-2px); }
    .hint { margin-top: 2.5rem; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #555; }
    .hint a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="code">404</div>
  <h1>This page struck out</h1>
  <p>The page you're looking for doesn't exist or has moved. Everything worth seeing is back on the home plate.</p>
  <a href="/" class="btn">← Back to Portfolio</a>
  <div class="hint">Looking for something specific? Try the <a href="/resume.html">resume</a> or the <a href="/ai-workflow.html">AI workflow case study</a>.</div>
</body>
</html>
